[[language]]
name = "python"
scope = "source.python"
injection-regex = "python"
file-types = ["py"]
shebangs = ["python"]
roots = ["setup.py", "setup.cfg", "pyproject.toml"]
comment-token = "#"
indent = { tab-width = 4, unit = "    "}
language-servers = ["ruff", "basedpyright"]
formatter = { command = "black", args = ["--quiet", "--line-length 99"] }
auto-format = false

########################################################################
#                              Python                                  #
########################################################################

[language-server.ruff]
command = "ruff"
args = ["server"]

[language-server.ruff.config.settings]
lineLength = 80

[language-server.ruff.config.settings.lint]
select = ["E4", "E7"]
preview = false

[language-server.ruff.config.settings.format]
preview = true

# [language-server.ty]
# command = "ty"
# args = ["server"]

# [language-server.ty.experimental.completions]
# enable = true
# ty.experimental.completions.enable": true

########################################################################
#                               LaTeX                                  #
########################################################################
[[language]]
name = "latex"
language-servers = ["texlab"]
scope = "source.tex"
file-types = ["tex"]
auto-format = false
comment-token = "%"
indent = {tab-width = 2, unit="   "}

[language-server.texlab]
command = "texlab"

[language-server.texlab.config.texlab.chktex]
onOpenAndSave = true
onEdit = true
